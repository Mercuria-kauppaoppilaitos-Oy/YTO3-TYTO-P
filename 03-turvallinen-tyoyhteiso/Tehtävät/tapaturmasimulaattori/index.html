<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapaturmasimulaattori – huomaa riskit ja toimi turvallisesti</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.container{max-width:980px;margin:0 auto;padding:20px}

/* ── Header ─────────────────────────────────────────────── */
.ex-header{background:linear-gradient(135deg,#0878b8,#004e8c);color:#fff;padding:30px 32px;border-radius:16px;margin-bottom:22px;position:relative;overflow:hidden}
.ex-header::after{content:'🦺';position:absolute;right:22px;top:50%;transform:translateY(-50%);font-size:76px;opacity:.12}
.ex-header h1{font-size:clamp(1.1rem,3vw,1.75rem);font-weight:800;line-height:1.25;margin-bottom:8px}
.ex-header p{font-size:.9rem;opacity:.9;line-height:1.6;max-width:580px}

/* ── Scenario tabs ───────────────────────────────────────── */
.sc-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.sc-tab{flex:1;min-width:155px;background:#fff;border:2px solid #dce3ed;border-radius:12px;padding:12px 10px;cursor:pointer;font-family:inherit;font-size:.83rem;font-weight:600;color:#555;text-align:center;transition:all .2s;line-height:1.3}
.sc-tab .t-icon{font-size:1.5rem;display:block;margin-bottom:4px}
.sc-tab:hover{border-color:#0878b8;color:#0878b8;background:#f0f7ff}
.sc-tab.active{border-color:#0878b8;color:#0878b8;background:#e8f4fe}
.sc-tab.explored{border-color:#22c55e;color:#15803d;background:#f0fdf4}
.sc-tab:focus-visible{outline:3px solid #0878b8;outline-offset:2px}

/* ── Panels ──────────────────────────────────────────────── */
.sc-panel{display:none}
.sc-panel.active{display:block;animation:fadeUp .35s ease}

/* ── Situation card ──────────────────────────────────────── */
.sit-card{background:#fff;border-radius:14px;padding:18px 22px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:14px;border-left:4px solid #0878b8}
.sit-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#0878b8,#004e8c);color:#fff;border-radius:20px;padding:3px 11px;font-size:.73rem;font-weight:700;margin-bottom:10px}
.sit-card h3{font-size:.98rem;font-weight:800;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.sit-card p{font-size:.9rem;line-height:1.7;color:#334}

/* ── Main 2-col area ─────────────────────────────────────── */
.main-area{display:grid;grid-template-columns:1fr 295px;gap:14px;margin-bottom:14px;align-items:start}
@media(max-width:720px){.main-area{grid-template-columns:1fr}}

/* ── Scene card ──────────────────────────────────────────── */
.scene-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.scene-subtitle{font-size:.75rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.scene-visual{background:#eef3f8;border-radius:10px;border:2px solid #dce3ed;padding:4px 8px 8px;margin-bottom:12px}
.scene-zones{display:grid;gap:6px;margin-bottom:0}
.zone{border-radius:8px;padding:10px 10px 8px;text-align:center}
.zone .z-emojis{font-size:1.35rem;display:block;line-height:1.2;margin-bottom:4px}
.zone small{font-size:.73rem;color:#556;font-weight:600;line-height:1.2}

/* ── Hotspot grid ────────────────────────────────────────── */
.hspot-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
@media(max-width:440px){.hspot-grid{grid-template-columns:1fr}}
.hspot{background:#f7f9fc;border:2px solid #dce3ed;border-radius:10px;padding:9px 11px;cursor:pointer;font-family:inherit;font-size:.83rem;font-weight:600;color:#334;text-align:left;display:flex;align-items:center;gap:8px;transition:all .2s;min-height:50px;line-height:1.3}
.hspot .hi{font-size:1.25rem;flex-shrink:0;width:26px;text-align:center}
.hspot:hover{border-color:#0878b8;background:#f0f7ff;transform:translateY(-2px);box-shadow:0 3px 10px rgba(8,120,184,.1)}
.hspot.clicked{border-color:#0878b8;background:#ddf0fe;color:#004e8c}
.hspot.active-hl{border-color:#004e8c;background:#bde3fb;box-shadow:0 0 0 3px rgba(8,120,184,.2)}
.hspot:focus-visible{outline:3px solid #0878b8;outline-offset:2px}
.hspot .check-mark{font-size:.7rem;color:#0878b8;margin-left:auto;flex-shrink:0;font-weight:700}

/* ── Observation sidebar ─────────────────────────────────── */
.obs-card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);overflow:hidden;position:sticky;top:16px}
.obs-head{background:linear-gradient(135deg,#162a45,#1a3a6e);color:#fff;padding:15px 17px}
.obs-head .oh-lbl{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;opacity:.65;margin-bottom:5px}
.obs-head .oh-icon{font-size:1.8rem;display:block;margin-bottom:4px}
.obs-head .oh-title{font-size:.93rem;font-weight:700;line-height:1.3}
.obs-body{padding:15px 17px}
.obs-empty{color:#aaa;font-size:.86rem;line-height:1.6;text-align:center;padding:12px 0}
.obs-empty .oe-ico{font-size:2rem;display:block;margin-bottom:8px}
.obs-text{font-size:.87rem;line-height:1.65;color:#334;margin-bottom:8px}
.obs-why{background:#f0f7ff;border-left:3px solid #0878b8;padding:9px 12px;margin:8px 0;font-size:.84rem;line-height:1.55;color:#1a3a6e;border-radius:0 8px 8px 0}
.obs-dont{background:#fff5f5;border-left:3px solid #dc2626;padding:9px 12px;font-size:.84rem;line-height:1.55;color:#7f1d1d;border-radius:0 8px 8px 0}
.obs-dont strong{color:#dc2626}
.obs-why strong{color:#0878b8}

/* ── Meter ───────────────────────────────────────────────── */
.meter-sec{background:#fff;border-radius:14px;padding:17px 20px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:14px}
.meter-head{font-size:.77rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:13px}
.meter-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:440px){.meter-grid{grid-template-columns:1fr}}
.meter-item{background:#f5f8fc;border-radius:10px;padding:11px 13px}
.mi-top{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.mi-icon{font-size:1.1rem}
.mi-label{font-size:.82rem;font-weight:700;color:#334;flex:1;line-height:1.2}
.mi-count{font-size:.77rem;font-weight:700;color:#0878b8}
.mi-track{height:7px;background:#dce3ed;border-radius:4px;overflow:hidden}
.mi-fill{height:100%;background:linear-gradient(90deg,#0878b8,#49b5e8);border-radius:4px;transition:width .55s ease}
.mi-fill.done{background:linear-gradient(90deg,#22c55e,#4ade80)}

/* ── Buttons ─────────────────────────────────────────────── */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.btn{border:none;cursor:pointer;border-radius:24px;padding:11px 21px;font-size:.9rem;font-weight:700;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,#0878b8,#004e8c);color:#fff;box-shadow:0 3px 12px rgba(8,120,184,.22)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(8,120,184,.32)}
.btn-secondary{background:#fff;color:#0878b8;border:2px solid #0878b8}
.btn-secondary:hover{background:#f0f7ff}
.btn:focus-visible{outline:3px solid #0878b8;outline-offset:3px}
.hidden{display:none!important}

/* ── Summary ─────────────────────────────────────────────── */
.summary{background:#fff;border-radius:14px;padding:22px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:14px;display:none}
.summary.show{display:block;animation:fadeIn .4s ease}
.sum-head{font-size:1.05rem;font-weight:800;color:#0878b8;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.sum-sub{font-size:.88rem;color:#555;margin-bottom:14px;line-height:1.5}
.sum-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.sum-list li{background:#f0f7ff;border-radius:10px;padding:10px 13px;font-size:.88rem;color:#1a2742;line-height:1.5;display:flex;align-items:flex-start;gap:8px}
.sum-list li::before{content:'✅';flex-shrink:0;margin-top:1px}

/* ── Nav footer ──────────────────────────────────────────── */
.nav-footer{background:#fff;border-radius:14px;padding:15px 22px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-top:20px}
.nav-footer a{color:#0878b8;font-size:.87rem;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:4px}
.nav-footer a:hover{text-decoration:underline}
.nav-info{font-size:.82rem;color:#888}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<div class="container">

<div class="ex-header">
  <h1>🦺 Tapaturmasimulaattori – huomaa riskit ja toimi turvallisesti</h1>
  <p>Klikkaa työpaikan näkymästä asioita, jotka työntekijän pitää huomioida. Tavoitteena on oppia havainnoimaan riskit ja rakentaa turvallinen tapa toimia.</p>
</div>

  </button>
  <button class="sc-tab" id="tab-3" onclick="selectSc(3)" role="tab" aria-selected="false" aria-controls="panel-3">

  </button>
</div>

<div id="panel-1" class="sc-panel active" role="tabpanel" aria-labelledby="tab-1"></div>
<div id="panel-2" class="sc-panel" role="tabpanel" aria-labelledby="tab-2"></div>
<div id="panel-3" class="sc-panel" role="tabpanel" aria-labelledby="tab-3"></div>

<div class="nav-footer">

</div>

</div>
<script>
/* ── SCORM 1.2 ─────────────────────────────────────────────── */
const SCORM = (function(){
  var api = null, conn = false;
  function find(w) {
    var n = 0;
    while (w && !w.API && n < 10) {
      if (w.parent && w.parent !== w) w = w.parent;
      else if (w.opener) w = w.opener;
      else break;
      n++;
    }
    return w && w.API ? w.API : null;
  }
  function init() { api = find(window); if (api) { var r = api.LMSInitialize(''); conn = (r === 'true' || r === true); } }
  function set(k, v) { if (!conn || !api) return; api.LMSSetValue(k, String(v)); }
  function commit() { if (!conn || !api) return; api.LMSCommit(''); }
  function complete(score, max) {
    set('cmi.core.score.raw', score);
    set('cmi.core.score.max', max);
    set('cmi.core.score.min', 0);
    set('cmi.core.lesson_status', (score / max) >= 0.5 ? 'passed' : 'failed');
    commit();
  }
  return { init: init, complete: complete };
})();

  },
  3: {

    zones: [
      { bg: '#e8ece8', emojis: '📦📦', label: 'Hyllyväli' },

      { bg: '#e8f0f8', emojis: '🚪👥', label: 'Uloskäynti / muut' }
    ],
    zonesLayout: 'repeat(3,1fr)',
    points: [
      { id: 'oma-sijainti', icon: '📍', label: 'Oma sijainti', cat: 'safety',
        text: 'Missä sinä olet? Onko sinulla tilaa liikkua?',

        why: 'Uhkaavassa tilanteessa tärkein asia on oma turvallisuutesi. Tiedä, mistä pääset pois hyllyvälistä. Asemoi itsesi niin, että voit poistua tarvittaessa.',

        text: 'Soita 112, jos väkivallan uhka on välitön.',

        dont: 'Älä ota riskiä — oma turvallisuutesi on tärkeämpää kuin asiakassuhde. Poliisi on sitä varten.' },

        why: 'Rauhallisuus voi rauhoittaa uhkaavaa henkilöä. Käytä lyhyitä lauseita: "Kuulen, että olet turhautunut. Miten voin auttaa?" Kuuntele aktiivisesti.',
        dont: 'Älä huuda, ivaa tai uhkaile takaisin. Vältä ehdottomasti fyysistä kontaktia.' },

        dont: 'Älä jätä kirjaamatta, vaikka tilanne rauettuisi itsestään — toistuvat uhkatilanteet pitää tunnistaa.' }
    ],
    summary: [
      'Arvioin oman sijaintini ja varmistin, että poistumisreitti on auki.',
      'Pidin turvallisen etäisyyden ja pysyin rauhallisena.',

      'Ohjasin muut asiakkaat turvaan rauhallisesti.',
      'Soitin 112, jos fyysinen väkivalta oli välittömästi uhkaava.',
      'Kirjasin uhkatilanteen tilanteen rauettua ja ilmoitin esihenkilölle.'

};

var CATS = {
  safety: { label: 'Oma turvallisuus',   icon: '🛡️' },
  help:   { label: 'Avun hälyttäminen',  icon: '🚨' },
  others: { label: 'Muiden suojaaminen', icon: '👥' },
  after:  { label: 'Jälkitoimet',        icon: '📋' }
};

/* ── STATE ─────────────────────────────────────────────────── */
var found = { 1: {}, 2: {}, 3: {} };  /* {pointId: true} */
var lastClick = { 1: null, 2: null, 3: null };
var scormDone = false;

/* ── PANEL INIT ─────────────────────────────────────────────── */
function initPanel(id) {
  var sc = SC[id];
  var hotspotsHtml = sc.points.map(function(p) {
    var clicked = found[id][p.id];
    return '<button class="hspot' + (clicked ? ' clicked' : '') + '"' +
      ' id="hs-' + id + '-' + p.id + '"' +
      ' onclick="clickPoint(' + id + ',\'' + p.id + '\')"' +
      ' aria-label="' + p.label + (clicked ? ' (havaittu)' : '') + '">' +
      '<span class="hi" aria-hidden="true">' + p.icon + '</span>' +
      '<span>' + p.label + '</span>' +
      (clicked ? '<span class="check-mark" aria-hidden="true">✓</span>' : '') +
      '</button>';
  }).join('');

  var zonesHtml = sc.zones.map(function(z) {
    return '<div class="zone" style="background:' + z.bg + '">' +
      '<span class="z-emojis" aria-hidden="true">' + z.emojis + '</span>' +
      '<small>' + z.label + '</small>' +
      '</div>';
  }).join('');

  var meterHtml = buildMeterHtml(id);
  var foundCount = Object.keys(found[id]).length;
  var total = sc.points.length;
  var showSumBtn = foundCount >= Math.ceil(total * 0.6);

  document.getElementById('panel-' + id).innerHTML =
    '<div class="sit-card">' +
      '<div class="sit-badge">' + sc.badge + '</div>' +
      '<h3><span aria-hidden="true">' + sc.icon + '</span> ' + sc.title + '</h3>' +
      '<p>' + sc.desc + '</p>' +
    '</div>' +

    '<div class="main-area">' +
      '<div class="scene-card">' +
        '<div class="scene-subtitle" aria-hidden="true">🔍 Klikkaa havaintopisteitä</div>' +
        '<div class="scene-visual">' +
          '<div class="scene-zones" style="display:grid;grid-template-columns:' + sc.zonesLayout + ';gap:6px;padding:6px" aria-label="Tilanteen visuaalinen kuvaus">' +
            zonesHtml +
          '</div>' +
        '</div>' +
        '<div class="hspot-grid" role="group" aria-label="Havaintopisteet">' +
          hotspotsHtml +
        '</div>' +
      '</div>' +

      '<div class="obs-card" id="obs-' + id + '">' +
        '<div class="obs-head">' +
          '<div class="oh-lbl">Havaintokortti</div>' +
          '<span class="oh-icon" id="obs-icon-' + id + '" aria-hidden="true">' + (lastClick[id] ? SC[id].points.find(function(p){return p.id===lastClick[id];}).icon : '👁️') + '</span>' +
          '<div class="oh-title" id="obs-title-' + id + '">' + (lastClick[id] ? SC[id].points.find(function(p){return p.id===lastClick[id];}).label : 'Valitse havaintopiste') + '</div>' +
        '</div>' +
        '<div class="obs-body" id="obs-body-' + id + '">' +
          buildObsBodyHtml(id, lastClick[id]) +
        '</div>' +
      '</div>' +
    '</div>' +

    '<div class="meter-sec">' +
      '<div class="meter-head" aria-hidden="true">📊 Tilannemittari – <span id="found-count-' + id + '">' + foundCount + '</span>/' + total + ' havaintoa</div>' +
      '<div class="meter-grid" id="meter-grid-' + id + '">' + meterHtml + '</div>' +
    '</div>' +

    '<div class="btn-row">' +
      '<button class="btn btn-primary' + (showSumBtn ? '' : ' hidden') + '" id="sum-btn-' + id + '" onclick="toggleSummary(' + id + ')" aria-expanded="false">📋 Näytä yhteenveto</button>' +
      '<button class="btn btn-secondary" onclick="resetSc(' + id + ')">🔄 Aloita alusta</button>' +
    '</div>' +

    '<div class="summary" id="summary-' + id + '" role="region" aria-live="polite">' +
      '<div class="sum-head">✅ Hyvä turvallisuustilanne huomioi nämä</div>' +
      '<p class="sum-sub" id="sum-sub-' + id + '">Tässä on yhteenveto tärkeimmistä toimista:</p>' +
      '<ul class="sum-list">' +
        sc.summary.map(function(s) { return '<li>' + s + '</li>'; }).join('') +
      '</ul>' +
    '</div>';
}

function buildObsBodyHtml(id, pointId) {
  if (!pointId) {
    return '<div class="obs-empty"><span class="oe-ico" aria-hidden="true">👆</span>Klikkaa vasemmalta havaintopiste nähdäksesi selityksen.</div>';
  }
  var pt = SC[id].points.find(function(p) { return p.id === pointId; });
  if (!pt) return '';
  return '<div class="obs-explanation">' +
    '<p class="obs-text">' + pt.text + '</p>' +
    '<div class="obs-why"><strong>💡 Miksi tärkeää:</strong><br>' + pt.why + '</div>' +
    '<div class="obs-dont"><strong>⚠️ Vältä:</strong><br>' + pt.dont + '</div>' +
    '</div>';
}

function buildMeterHtml(id) {
  var sc = SC[id];
  return Object.keys(CATS).map(function(key) {
    var cat = CATS[key];
    var total = sc.points.filter(function(p) { return p.cat === key; }).length;
    var done = Object.keys(found[id]).filter(function(fid) {
      return sc.points.some(function(p) { return p.id === fid && p.cat === key; });
    }).length;
    var pct = total ? Math.round(done / total * 100) : 0;
    return '<div class="meter-item">' +
      '<div class="mi-top">' +
        '<span class="mi-icon" aria-hidden="true">' + cat.icon + '</span>' +
        '<span class="mi-label">' + cat.label + '</span>' +
        '<span class="mi-count" id="mc-' + id + '-' + key + '">' + done + '/' + total + '</span>' +
      '</div>' +
      '<div class="mi-track" role="progressbar" aria-valuenow="' + pct + '" aria-valuemin="0" aria-valuemax="100" aria-label="' + cat.label + ': ' + pct + '%">' +
        '<div class="mi-fill' + (pct === 100 ? ' done' : '') + '" id="mf-' + id + '-' + key + '" style="width:' + pct + '%"></div>' +
      '</div>' +
    '</div>';
  }).join('');
}

/* ── CLICK HANDLER ──────────────────────────────────────────── */
function clickPoint(scId, pointId) {
  var sc = SC[scId];
  var pt = sc.points.find(function(p) { return p.id === pointId; });
  if (!pt) return;

  var isNew = !found[scId][pointId];
  found[scId][pointId] = true;
  lastClick[scId] = pointId;

  if (isNew) {
    /* Update button state */
    var btn = document.getElementById('hs-' + scId + '-' + pointId);
    if (btn) {
      btn.classList.add('clicked');
      btn.setAttribute('aria-label', pt.label + ' (havaittu)');
      if (!btn.querySelector('.check-mark')) {
        var chk = document.createElement('span');
        chk.className = 'check-mark';
        chk.setAttribute('aria-hidden', 'true');
        chk.textContent = '✓';
        btn.appendChild(chk);
      }
    }

    /* Update meter bars */
    updateMeter(scId);

    /* Update found count */
    var count = Object.keys(found[scId]).length;
    var el = document.getElementById('found-count-' + scId);
    if (el) el.textContent = count;

    /* Show summary button when 60%+ found */
    var total = sc.points.length;
    if (count >= Math.ceil(total * 0.6)) {
      var sumBtn = document.getElementById('sum-btn-' + scId);
      if (sumBtn) sumBtn.classList.remove('hidden');
    }

    /* Mark tab as explored */
    document.getElementById('tab-' + scId).classList.add('explored');

    /* SCORM completion check */
    tryScorm();
  }

  /* Update observation card (always, even on re-click) */
  var iconEl = document.getElementById('obs-icon-' + scId);
  var titleEl = document.getElementById('obs-title-' + scId);
  var bodyEl = document.getElementById('obs-body-' + scId);
  if (iconEl) iconEl.textContent = pt.icon;
  if (titleEl) titleEl.textContent = pt.label;
  if (bodyEl) bodyEl.innerHTML = buildObsBodyHtml(scId, pointId);

  /* Highlight active button */
  document.querySelectorAll('#panel-' + scId + ' .hspot.active-hl').forEach(function(b) {
    b.classList.remove('active-hl');
  });
  var activeBtn = document.getElementById('hs-' + scId + '-' + pointId);
  if (activeBtn) activeBtn.classList.add('active-hl');

  /* Scroll obs card into view on small screens */
  if (window.innerWidth <= 720) {
    var obs = document.getElementById('obs-' + scId);
    if (obs) setTimeout(function() { obs.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 50);
  }
}

function updateMeter(scId) {
  var sc = SC[scId];
  Object.keys(CATS).forEach(function(key) {
    var total = sc.points.filter(function(p) { return p.cat === key; }).length;
    var done = Object.keys(found[scId]).filter(function(fid) {
      return sc.points.some(function(p) { return p.id === fid && p.cat === key; });
    }).length;
    var pct = total ? Math.round(done / total * 100) : 0;
    var fill = document.getElementById('mf-' + scId + '-' + key);
    var count = document.getElementById('mc-' + scId + '-' + key);
    var track = fill && fill.parentElement;
    if (fill) {
      fill.style.width = pct + '%';
      fill.classList.toggle('done', pct === 100);
    }
    if (count) count.textContent = done + '/' + total;
    if (track) {
      track.setAttribute('aria-valuenow', pct);
      track.setAttribute('aria-label', CATS[key].label + ': ' + pct + '%');
    }
  });
}

function toggleSummary(id) {
  var s = document.getElementById('summary-' + id);
  var btn = document.getElementById('sum-btn-' + id);
  var show = !s.classList.contains('show');
  s.classList.toggle('show', show);
  if (btn) {
    btn.setAttribute('aria-expanded', show ? 'true' : 'false');
    btn.innerHTML = show ? '📋 Piilota yhteenveto' : '📋 Näytä yhteenveto';
  }
  if (show) {
    var sub = document.getElementById('sum-sub-' + id);
    if (sub) sub.textContent = 'Olet löytänyt ' + Object.keys(found[id]).length + '/' + SC[id].points.length + ' havaintopistettä. Tässä on yhteenveto tärkeimmistä toimista:';
    tryScorm();
  }
}

function resetSc(id) {
  found[id] = {};
  lastClick[id] = null;
  document.getElementById('tab-' + id).classList.remove('explored');
  initPanel(id);
}

function selectSc(id) {
  document.querySelectorAll('.sc-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.sc-tab').forEach(function(t) {
    t.classList.remove('active');
    t.setAttribute('aria-selected', 'false');
  });
  document.getElementById('panel-' + id).classList.add('active');
  var tab = document.getElementById('tab-' + id);
  tab.classList.add('active');
  tab.setAttribute('aria-selected', 'true');
}

function tryScorm() {
  if (scormDone) return;
  var totalAll = 0, doneAll = 0;
  [1, 2, 3].forEach(function(id) {
    totalAll += SC[id].points.length;
    doneAll += Object.keys(found[id]).length;
  });
  if (doneAll / totalAll >= 0.5) {
    SCORM.complete(Math.round(doneAll / totalAll * 100), 100);
    scormDone = true;
  }
}

/* ── BOOTSTRAP ──────────────────────────────────────────────── */
[1, 2, 3].forEach(initPanel);
</script>
</body>
</html>
